services:
  demo-game:
    image: rust:1.82
    working_dir: /workspace
    command: cargo run -p kitu-demo-game --bin kitu-demo-game-admin-host
    environment:
      RUST_LOG: info
      KITU_DEMO_GAME_BIND: 0.0.0.0:8787
    ports:
      - "8787:8787"
    volumes:
      - ../..:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - target-cache:/workspace/target

  webtransport-gateway:
    build:
      context: ../..
      dockerfile: tools/kitu-webtransport-gateway/Dockerfile
    working_dir: /workspace/tools/kitu-webtransport-gateway
    command: cargo run --locked --bin kitu-webtransport-gateway
    env_file:
      - path: ../../tools/kitu-webtransport-gateway/certs/webtransport.env
        required: false
    environment:
      RUST_LOG: info
      KITU_WT_GATEWAY_PORT: 9443
      KITU_GATEWAY_INTERNAL_WS_URL: ws://demo-game:8787/ws
    ports:
      - "9443:9443/udp"
    volumes:
      - ../..:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - webtransport-gateway-target:/workspace/tools/kitu-webtransport-gateway/target
    depends_on:
      - demo-game

  web-admin:
    build:
      context: ../..
      dockerfile: tools/kitu-web-admin/frontend/Dockerfile
    working_dir: /workspace/tools/kitu-web-admin/frontend
    command: sh -c "pnpm install && pnpm run dev --host 0.0.0.0"
    env_file:
      - path: ../../tools/kitu-webtransport-gateway/certs/webtransport.env
        required: false
    environment:
      PUBLIC_KITU_ADMIN_WS_URL: ws://localhost:8787/ws
      PUBLIC_KITU_ADMIN_WT_URL: https://localhost:9443
      PUBLIC_KITU_ADMIN_KEP_ROUTE: /room/main
      PUBLIC_KITU_ADMIN_API_URL: http://localhost:8787
    ports:
      - "5173:5173"
    volumes:
      - ../..:/workspace
      - cargo-cache:/usr/local/cargo/registry
      - web-admin-node-modules:/workspace/tools/kitu-web-admin/frontend/node_modules
    depends_on:
      - demo-game
      - webtransport-gateway

volumes:
  cargo-cache:
  target-cache:
  webtransport-gateway-target:
  web-admin-node-modules:
